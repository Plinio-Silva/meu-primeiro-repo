<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Alunos</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h1 class="mb-3">Lista de Alunos</h1>
<a th:href="@{/alunos/novo}" class="btn btn-primary mb-3">Novo Aluno</a>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Idade</th>
        <th>Turma</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="aluno : ${alunos}">
        <td th:text="${aluno.id}"></td>
        <td th:text="${aluno.nome}"></td>
        <td th:text="${aluno.idade}"></td>
        <td th:text="${aluno.turma}"></td>
        <td>
            <a th:href="@{'/alunos/editar/' + ${aluno.id}}" class="btn btn-sm btn-warning">Editar</a>
            <a th:href="@{'/alunos/excluir/' + ${aluno.id}}" class="btn btn-sm btn-danger"
               onclick="return confirm('Confirma a exclusão?');">Excluir</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
